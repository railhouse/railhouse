info:
  name: Edit Organization
  type: http
  seq: 3

http:
  method: PUT
  url: "{{base_url}}/api/organizations/{{organization_id}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "Flightdrift HQ",
          "url": "https://flightdrift.com",
          "iconUrl": "https://example.com/flightdrift-hq.png"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK
    request:
      url: "{{base_url}}/api/organizations/{{organization_id}}"
      method: PUT
      body:
        type: json
        data: |-
          {
              "name": "Flightdrift HQ",
              "url": "https://flightdrift.com",
              "iconUrl": "https://example.com/flightdrift-hq.png"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Organization updated successfully",
            "data": {
              "organization": {
                "id": "019e6a7d-293c-716f-9d2f-c32f2bccfc17",
                "name": "Flightdrift HQ",
                "url": "https://flightdrift.com",
                "iconUrl": "https://example.com/flightdrift-hq.png"
              }
            }
          }
