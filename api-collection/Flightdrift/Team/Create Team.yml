info:
  name: Create Team
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/teams"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "Flightdrift Art Team",
          "website": "https://flightdrift.dev",
          "description": "The main development team for Flightdrift",
          "pictureLink": "https://example.com/flightdrift.png"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Created
    request:
      url: ""
      method: POST
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true,
              "message": "Team created successfully",
              "data": {
                  "team": {
                      "id": 2,
                      "name": "Flightdrift Art Team",
                      "website": "https://flightdrift.dev",
                      "description": "The main development team for Flightdrift",
                      "pictureLink": "https://example.com/flightdrift.png"
                  }
              }
          }
