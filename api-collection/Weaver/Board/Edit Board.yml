info:
  name: Edit Board
  type: http
  seq: 3

http:
  method: PUT
  url: "{{base_url}}/api/boards/1"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "title": "Weaver Dev Board Updated",
          "description": "Board for tracking new project"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK
    request:
      url: "{{base_url}}/api/boards/1"
      method: PUT
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "name": "Updated Project Board",
              "description": "Updated description"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true,
              "message": "Board updated successfully",
              "data": {
                  "board": {
                      "id": 1,
                      "title": "Weaver Dev Board Updated",
                      "description": "Board for tracking new project",
                      "teamId": 1
                  }
              }
          }
