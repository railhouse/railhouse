info:
  name: Get Boards
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/teams/1/boards"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK
    request:
      url: "{{base_url}}/api/teams/1/boards"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true,
              "message": "Boards retrieved successfully",
              "data": {
                  "boards": [
                      {
                          "id": 1,
                          "title": "Weaver Dev Board",
                          "description": "Board for tracking new project",
                          "teamId": 1
                      }
                  ]
              }
          }
