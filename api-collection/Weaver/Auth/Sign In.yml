info:
  name: Sign In
  type: http
  seq: 4

http:
  method: POST
  url: "{{base_url}}/api/auth/signin"
  body:
    type: json
    data: "{\r

      \    \"username\": \"jamius19\",\r

      \    \"password\": \"test123\"\r

      }"

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();

        bru.setEnvVar("token", jsonData.data.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK
    request:
      url: "{{base_url}}/api/auth/signin"
      method: POST
      body:
        type: json
        data: "{\r

          \    \"username\": \"jamius19\",\r

          \    \"password\": \"test123\"\r

