        - name: Pragma
          value: no-cache
        - name: Expires
          value: "0"
        - name: X-Frame-Options
          value: DENY
        - name: Content-Type
          value: application/json
        - name: Transfer-Encoding
          value: chunked
        - name: Date
          value: Tue, 05 May 2026 10:13:32 GMT
