info:
  name: Auth Check
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/api/test/auth"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: OK
    request:
      url: "{{base_url}}/api/test/auth"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: X-Content-Type-Options
          value: nosniff
        - name: X-XSS-Protection
          value: "0"
        - name: Cache-Control
          value: no-cache, no-store, max-age=0, must-revalidate
        - name: Pragma
          value: no-cache
        - name: Expires
          value: "0"
        - name: X-Frame-Options
          value: DENY
        - name: Content-Type
          value: text/plain;charset=UTF-8
        - name: Content-Length
          value: "30"
        - name: Date
          value: Tue, 05 May 2026 10:35:22 GMT
        - name: Keep-Alive
          value: timeout=60
        - name: Connection
          value: keep-alive
      body:
        type: text
        data: Authentication test successful
